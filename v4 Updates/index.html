// ── SCORING ENGINE ────────────────────────────────────────────────────────────
function getBlitz(f, flat) {
  let pos = 0; let neg = 0;
  for (const m of f.blitzMods) {
    if (m.tags.some(t => flat.includes(t))) {
      if (m.d > 0) pos = Math.max(pos, m.d);   // take the single largest positive mod
      else         neg = Math.min(neg, m.d);    // take the single largest negative mod
    }
  }
  return Math.round(Math.max(5, Math.min(50, f.blitzBase + pos + neg)));
}

function blitzInfo(pct) {
  if (pct <= 10) return { label: "Very Conservative", color: "#60906e" };
  if (pct <= 20) return { label: "Conservative",      color: "#6a9870" };
  if (pct <= 30) return { label: "Moderate",          color: "#a07830" };
  if (pct <= 40) return { label: "Aggressive",        color: "#a06030" };
  return                 { label: "Max Pressure",     color: "#aa5050" };
}

// Returns ALL matched formations with score, sorted — no slice
// Score is normalized to a 0-100 match percentage based on formation's total possible tags
// runPass: 1-7 discrete positions (1=Full Pass, 4=Balanced, 7=Full Run)
function scoreAll(flat, book, runPass) {
  if (!flat.length) return [];
  const pos = runPass !== undefined ? runPass : 4;
  const BIAS_MAP = { 1: -1.0, 2: -0.65, 3: -0.30, 4: 0, 5: 0.30, 6: 0.65, 7: 1.0 };
  const runBias = BIAS_MAP[pos] || 0;  // negative=pass-heavy, positive=run-heavy
  return Object.entries(FDB).map(([name, d]) => {
    if (book && book !== "All") {
      if (!d.books.includes(book) && !d.books.includes("All")) return null;
    }
    const coreHits = d.coreTags.filter(t => flat.includes(t));
    const suppHits = d.suppTags.filter(t => flat.includes(t));
    const raw = coreHits.length * 2 + suppHits.length;
    const maxPossible = d.coreTags.length * 2 + d.suppTags.length;
    let sc = maxPossible > 0 ? Math.round((raw / maxPossible) * 100) : 0;
    // Run/pass bias: run formations get +bonus when slider is run-heavy; pass formations when pass-heavy
    if (sc > 0) {
      const isRun  = d.priority === "run";
      const isPass = d.priority === "pass";
      if (isRun  && runBias > 0) sc = Math.min(100, sc + Math.round(runBias * 15));
      if (isPass && runBias < 0) sc = Math.min(100, sc + Math.round(-runBias * 15));
      if (isRun  && runBias < 0) sc = Math.max(0, sc + Math.round(runBias * 10));
      if (isPass && runBias > 0) sc = Math.max(0, sc + Math.round(-runBias * 10));
    }
    // Penalize formations tagged as poor matchups for this opponent
    if (d.avoidTags && d.avoidTags.some(t => flat.includes(t))) sc = Math.max(0, sc - 25);
    if (sc === 0) return null;
    return { name, sc, coreHits, suppHits, blitz: getBlitz(d, flat), ...d };
  }).filter(Boolean).filter(f => f.sc > 0).sort((a, b) => b.sc - a.sc);
}

// Group formations by personnel type for the "All Formations" browser
// Re-scores formations weighted toward a specific personnel tag
// so switching tabs re-ranks, not just re-filters
function scoreForPersonnel(personnelTag, allTraits) {
  if (!allTraits.length) return [];
  // Personnel-adjacent tags that co-occur with this package
  const personnelContext = {
    p10:  ["p10","no_run","empty","trips","elite_wr","slot_threat","hurry_up","quick_game","screens","rpo","four_wide"],
    p11:  ["p11","rpo","play_action","quick_game","outside_run","inside_run","elite_wr","slot_threat","trips","motion_heavy"],
    p12:  ["p12","p21","elite_te","inside_run","outside_run","play_action","seam_routes","run_heavy_1st","strong_oline"],
    p13:  ["p12","p13","elite_te","inside_run","strong_oline","run_heavy_1st","fb_lead","p21","seam_routes"],
    p21:  ["p21","p22","fb_lead","inside_run","counter_trap","strong_oline","run_heavy_1st","short_yardage_run"],
    p22:  ["p22","p21","strong_oline","inside_run","run_heavy_1st","fb_lead","four_down_go","short_yardage_run"],
    trips:["trips","p10","p11","elite_wr","slot_threat","motion_heavy","rpo","quick_game","flat_attack"],
    empty:["empty","p10","pass_heavy_3rd","qb_pocket","no_run","hurry_up","west_coast","quick_game"],
  };
  const ctx = personnelContext[personnelTag] || [personnelTag];
  return Object.entries(FDB).map(([name, d]) => {
    const coreHits = d.coreTags.filter(t => allTraits.includes(t));
    const suppHits = d.suppTags.filter(t => allTraits.includes(t));
    const raw = coreHits.length * 2 + suppHits.length;
    const maxPossible = d.coreTags.length * 2 + d.suppTags.length;
    const baseNorm = maxPossible > 0 ? (raw / maxPossible) * 100 : 0;
    const personnelBonus = ctx.filter(t => d.coreTags.includes(t)).length * 3
                         + ctx.filter(t => d.suppTags.includes(t)).length * 1;
    const sc = Math.round(baseNorm + personnelBonus);
    if (sc === 0) return null;
    return { name, sc, coreHits, suppHits, blitz: getBlitz(d, allTraits), ...d };
  }).filter(Boolean).sort((a, b) => b.sc - a.sc);
}

function groupByPersonnel(scored) {
  const order = ["Prevent","Goal Line","Heavy","Base","Nickel","Dime"];
  const groups = {};
  for (const f of scored) {
    const key = f.personnel || "Base";
    if (!groups[key]) groups[key] = [];
    groups[key].push(f);
  }
  return order.filter(k => groups[k]).map(k => ({ label: k, formations: groups[k] }));
}

  );

function getAvailableFamilies(flat) {
  const has = (tag) => flat.includes(tag);
  const fams = [];

  // ── 10 Personnel ──────────────────────────────────────────────
  if (has("p10")) {
    fams.push("p10_gun");
    if (has("trips")) fams.push("p10_trips");
    if (has("empty")) fams.push("p10_empty");
  }

  // ── 11 Personnel — require p11 explicitly OR strong spread signal (2+ co-occurring tendencies) ──
  const spreadSignals = [has("rpo"), has("outside_run"), has("quick_game"), has("motion_heavy"), has("hurry_up"), has("trips")].filter(Boolean).length;
  const has11 = has("p11") || spreadSignals >= 2;
  if (has11) {
    // Pistol: run-based spread teams
    if (has("rpo") || has("option_run") || has("outside_run") || has("inside_run") || has("hb_stretch"))
      fams.push("p11_pistol");
    // Gun: standard spread
    fams.push("p11_gun");
    // Trips: if they bunch/trips
    if (has("trips") || has("motion_heavy")) fams.push("p11_trips");
    // Empty: if they go empty
    if (has("empty")) fams.push("p11_empty");
    // Motion: if motion is heavy
    if (has("motion_heavy") && !fams.includes("p11_trips")) fams.push("p11_motion");
  }

  // ── 12 Personnel ──────────────────────────────────────────────
  if (has("p12") || has("elite_te") || has("seam_routes")) {
    fams.push("p12_gun");
    if (has("outside_run") || has("inside_run") || has("run_heavy_1st") || has("hb_stretch"))
      fams.push("p12_pistol");
    if (has("strong_oline") || has("fb_lead") || has("run_heavy_1st") || has("p21"))
      fams.push("p12_under");
    if (has("trips") || has("motion_heavy")) fams.push("p12_trips");
  }

  // ── 13 Personnel ──────────────────────────────────────────────
  if (has("p13")) {
    fams.push("p13_iForm");
    if (has("play_action") || has("seam_routes") || has("elite_te") || has("west_coast"))
      fams.push("p13_gun");
  }

  // ── 21 Personnel ──────────────────────────────────────────────
  if (has("p21") || has("fb_lead")) {
    if (has("fb_lead") || has("strong_oline") || has("run_heavy_1st") || has("inside_run"))
      fams.push("p21_iForm");
    if (has("outside_run") || has("hb_stretch") || has("inside_run"))
      fams.push("p21_pistol");
    if (has("play_action") || has("west_coast") || has("seam_routes"))
      fams.push("p21_gun");
    if (has("option_run") || has("dual_threat") || has("mobile_qb"))
      fams.push("p21_option");
  }

  // ── 22 Personnel ──────────────────────────────────────────────
  if (has("p22") || has("strong_oline") && (has("run_heavy_1st") || has("short_yardage_run"))) {
    fams.push("p22_iForm");
    if (has("outside_run") || has("inside_run") || has("counter_trap"))
      fams.push("p22_pistol");
    if (has("option_run") || has("dual_threat") || has("mobile_qb"))
      fams.push("p22_wildcat");
  }

  // ── Trips / Empty standalone (when not already covered under 11p) ──────────
  if (has("trips") && !has11) {
    fams.push("trips_gun");
    if (has("motion_heavy")) fams.push("trips_motion");
  }
  if (has("empty") && !has("p10") && !has11) {
    fams.push("empty_gun");
    if (has("trips")) fams.push("empty_trips");
  }

  // Always guarantee at least one family shows if any personnel tagged ─────────
  if (fams.length === 0) {
    if (has("p11")) fams.push("p11_gun");
    else if (has("p12")) fams.push("p12_gun");
    else if (has("p13")) fams.push("p13_iForm");
    else if (has("p21")) fams.push("p21_iForm");
    else if (has("p22")) fams.push("p22_iForm");
    else fams.push("p11_gun"); // fallback
  }

  return [...new Set(fams)];
}

function scoreForFamily(familyId, allTraits) {
  const family = PERSONNEL_FAMILIES[familyId];
  if (!family) return scoreForPersonnel("p11", allTraits);
  const adj = FAMILY_ADJUSTMENTS[familyId];
  const biasNames = adj ? adj.bias : [];
  const baseResults = scoreForPersonnel(family.base, allTraits);
  const biased = baseResults.filter(f => biasNames.includes(f.name));
  const rest   = baseResults.filter(f => !biasNames.includes(f.name));
  return [...biased, ...rest];
}

function CFB26Schemes() {
  const [sel, setSel]         = useState({});
  const [runPass, setRunPass]  = useState(4);  // 1-7: 1=Full Pass, 4=Balanced, 7=Full Run
  const [step, setStep]       = useState("scout");
  const [scored, setScored]   = useState([]);
  const [openGrp, setOpenGrp] = useState(null);
  const [activeP, setActiveP] = useState(null);
  const [selFm, setSelFm]     = useState(null);       // selected detail formation
  const [mainTab, setMainTab] = useState("personnel"); // "personnel" | "all"
  const [showPB, setShowPB]   = useState(false);
  const [modal, setModal]     = useState(false);
  const [showRecModal, setShowRecModal] = useState(false);
  const [saveName, setSaveName] = useState("");
  const [profiles, setProfiles] = useState(() => {
    try {
      const saved = localStorage.getItem('cfb26_profiles');
      return saved ? JSON.parse(saved) : {};
    } catch(e) { return {}; }
  });

  // Persist profiles to localStorage whenever they change
  const [shareToast, setShareToast] = useState(null);
  const [myBook, setMyBook] = useState(() => {
    try { return localStorage.getItem("cfb26_myBook") || "All"; } catch(e) { return "All"; }
  });

  const saveProfiles = (updater) => {
    setProfiles(prev => {
      const next = typeof updater === 'function' ? updater(prev) : updater;
      try { localStorage.setItem('cfb26_profiles', JSON.stringify(next)); } catch(e) {}
      return next;
    });
  };



  const [importMsg, setImportMsg] = useState(null);
  const [compareA, setCompareA] = useState("3-3-5 Tite");
  const [teamConf, setTeamConf]   = useState("all");
  const [teamSearch, setTeamSearch] = useState("");
  const [compareB, setCompareB] = useState("4-3 Multiple");
  const [quickAdjOpen, setQuickAdjOpen] = useState(false);

  const changeBook = (book) => {
    setMyBook(book);
    try { localStorage.setItem("cfb26_myBook", book); } catch(e) {}
    const newFlat = Object.values(sel).flat();
    const results = scoreAll(newFlat, book);
    setScored(results);
    setSelFm(null);
  };


  // ── EXPORT PROFILES ──────────────────────────────────────────────
  const exportProfiles = () => {
    if (!Object.keys(profiles).length) return;
    const data = JSON.stringify({ version: 1, profiles }, null, 2);
    const blob = new Blob([data], { type: "application/json" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = "cfb26-dc-profiles.json";
    a.click();
    URL.revokeObjectURL(url);
  };

  // ── IMPORT PROFILES ───────────────────────────────────────────────
  const importProfiles = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const parsed = JSON.parse(ev.target.result);
        const incoming = parsed.profiles || parsed; // support both formats
        if (typeof incoming === "object" && incoming !== null) {
          saveProfiles(prev => ({ ...prev, ...incoming }));
          setImportMsg("✓ " + Object.keys(incoming).length + " profile(s) imported");
        } else {
          setImportMsg("✗ Invalid file format");
        }
      } catch(err) {
        setImportMsg("✗ Could not read file");
      }
      setTimeout(() => setImportMsg(null), 3000);
    };
    reader.readAsText(file);
    e.target.value = ""; // reset so same file can be re-imported
  };

  // Build the plain-text game plan summary
  const buildShareText = () => {
    const lines = [];
    const personnelList = personnelSel.length ? personnelSel : ['p11'];
    lines.push('CFB26 DC SCHEME BUILDER — GAME PLAN');
    lines.push('═'.repeat(38));
    lines.push('');

    // Scouted traits summary
    const allTraits = Object.entries(sel).flatMap(([grp, ids]) =>
      ids.map(id => TRAIT_LABELS[id] || id)
    );
    if (allTraits.length) {
      lines.push('SCOUTED TRAITS:');
      allTraits.forEach(t => lines.push(`  · ${t}`));
      lines.push('');
    }

    // Personnel-based calls
    lines.push('PERSONNEL CALLS:');
    lines.push('─'.repeat(30));
    personnelList.forEach(pid => {
      const pd = PMAP[pid];
      if (!pd) return;
      lines.push(`${pd.label.toUpperCase()}`);
      // Top 2 formations for this personnel
      const persMatches = scored
        .filter(f => f.coreTags.includes(pid) || f.suppTags.includes(pid))
        .slice(0, 3);
      persMatches.forEach((fm, i) => {
        lines.push(`  #${i+1} ${fm.name} (${fm.blitz}% blitz)`);
      });
      lines.push(`  AVOID: ${pd.avoid}`);
      lines.push('');
    });

    // Top 4 formation deep dives
    lines.push('TOP MATCHED FORMATIONS:');
    lines.push('─'.repeat(30));
    scored.slice(0, 4).forEach((fm, i) => {
      const blitz = getBlitz(fm, flat);
      lines.push(`#${i+1} ${fm.name} — ${fm.sc}% match · ${blitz}% blitz`);
      lines.push(`  Base: ${fm.coverages && fm.coverages[0] ? fm.coverages[0].name : '—'}`);
      if (fm.coreHits && fm.coreHits.length) {
        lines.push(`  Core matches: ${fm.coreHits.map(t => TRAIT_LABELS[t]||t).join(', ')}`);
      }
      if (fm.callsheet && fm.callsheet.length) {
        lines.push(`  Key calls:`);
        fm.callsheet.slice(0, 3).forEach(c => lines.push(`    ${c.down}: ${c.call}`));
      }
      lines.push('');
    });

    lines.push('Generated by Scheme Builders');
    return lines.join('\n');
  };

  const handleShare = async () => {
    const text = buildShareText();
    const title = 'CFB26 DC Game Plan';
    try {
      if (navigator.share) {
        await navigator.share({ title, text });
        setShareToast('shared');
      } else {
        await navigator.clipboard.writeText(text);
        setShareToast('copied');
      }
    } catch(e) {
      // Fallback: try clipboard
      try {
        await navigator.clipboard.writeText(text);
        setShareToast('copied');
      } catch(e2) {}
    }
    setTimeout(() => setShareToast(null), 2500);
  };

  const toggle = useCallback((g, t) =>
    setSel(p => { const c = p[g] || []; return { ...p, [g]: c.includes(t) ? c.filter(x => x !== t) : [...c, t] }; }), []);

  const flat = Object.values(sel).flat();
  const personnelSel = sel.personnel || [];

  const build = () => {
    const bookToUse = myBook || "All";
    const results = scoreAll(flat, bookToUse, runPass);
    setScored(results);
    const personnel = personnelSel.length ? personnelSel : ["p11"];
    setActiveP(personnel[0]);
    setSelFm(null);
    setMainTab("personnel");
    setStep("plan");
    window.scrollTo(0, 0);
  };

  // ── TEAMS SCREEN ─────────────────────────────────────────────────────────────
  if (step === "teams") {
    const filteredTeams = TEAMS.filter(t => {
      const matchConf = teamConf === "all" || t.conf === teamConf;
      const matchSearch = !teamSearch || t.name.toLowerCase().includes(teamSearch.toLowerCase());
      return matchConf && matchSearch;
    }).sort((a, b) => a.name.localeCompare(b.name));

    const PERS_LABELS = {"p10":"5-WR","p11":"11p","p12":"12p (2 TE)","p21":"21p (FB)","p22":"22p Jumbo","trips":"Trips","empty":"Empty"};
    const buildFromTeam = (team) => {
      const results = scoreAll(team.traits, "All");
      setMyBook("All");
      try { localStorage.setItem("cfb26_myBook", "All"); } catch(e) {}
      setSel({ _team: team.traits });
      setScored(results);
      setActiveP(team.traits.find(t => ["p10","p11","p12","p21","p22","trips","empty"].includes(t)) || "p11");
      setSelFm(null);
      setMainTab("personnel");
      setStep("plan");
      window.scrollTo(0, 0);
    };

    return (
      <div style={{ fontFamily: "'IBM Plex Sans', system-ui, sans-serif", background: "#080c12", minHeight: "100vh", color: "#c5d0dc", maxWidth: 720, margin: "0 auto" }}>
        {/* Header */}
        <div style={{ background: "linear-gradient(135deg,#07090f,#0c1220)", borderBottom: "2px solid #b8880c", padding: "13px 15px 12px", paddingTop: "calc(env(safe-area-inset-top) + 13px)", position: "sticky", top: 0, zIndex: 100 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontSize: 10, color: "#a07830", letterSpacing: "2px", textTransform: "uppercase", fontFamily: "'IBM Plex Mono', monospace", marginBottom: 2 }}>Scheme Builders</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: "#c5d0dc", fontFamily: "'IBM Plex Mono', monospace" }}>Team Picker</div>
            </div>
            <button onClick={() => setStep("scout")} style={{ background: "transparent", border: "1px solid #2a3d52", borderRadius: 6, padding: "5px 10px", color: "#6888a0", fontSize: 11, cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace" }}>← Back</button>
          </div>
          {/* Search */}
          <input
            value={teamSearch}
            onChange={e => setTeamSearch(e.target.value)}
            placeholder="Search teams..."
            style={{ width: "100%", marginTop: 10, padding: "8px 12px", background: "#0d1622", border: "1px solid #1e2d3d", borderRadius: 7, color: "#c5d0dc", fontSize: 12, fontFamily: "'IBM Plex Mono', monospace", boxSizing: "border-box", outline: "none" }}
          />
        </div>

        {/* Conference filter tabs — 2 rows of 6 */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 5, padding: "10px 14px 10px", borderBottom: "1px solid #1e2d3d" }}>
          {CONFERENCES.map(c => (
            <button key={c.id} onClick={() => setTeamConf(c.id)} style={{
              padding: "5px 4px", borderRadius: 6, border: "1px solid #1e2d3d",
              background: teamConf === c.id ? "#0d1622" : "transparent",
              color: teamConf === c.id ? "#b8880c" : "#6888a0",
              fontSize: 10, cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace",
              fontWeight: teamConf === c.id ? "bold" : "normal",
              textAlign: "center",
            }}>{c.label}</button>
          ))}
        </div>

        {/* Team grid */}
        <div style={{ padding: "12px 14px 30px" }}>
          <div style={{ fontSize: 10, color: "#6888a0", fontFamily: "'IBM Plex Mono', monospace", marginBottom: 10 }}>
            {filteredTeams.length} teams · tap to build game plan
          </div>
          {filteredTeams.length === 0 && (
            <div style={{ textAlign: "center", color: "#4a5a6a", padding: 40, fontSize: 12 }}>No teams found</div>
          )}
          {filteredTeams.map(team => (
            <button key={team.id} onClick={() => buildFromTeam(team)} style={{
              width: "100%", display: "flex", alignItems: "center", justifyContent: "space-between",
              padding: "11px 14px", marginBottom: 7,
              background: "#0d1622", border: "1px solid #1e2d3d",
              borderLeft: "3px solid " + team.color,
              borderRadius: 7, cursor: "pointer", textAlign: "left",
            }}>
              <div>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#c5d0dc", fontFamily: "'IBM Plex Mono', monospace", marginBottom: 2 }}>{team.name}</div>
                <div style={{ fontSize: 10, color: "#6888a0", fontFamily: "'IBM Plex Mono', monospace" }}>
                  <span style={{color:"#6888a0"}}>{team.conf}</span>
                  <span style={{color:"#3a4e60",margin:"0 4px"}}>{" · "}</span>
                  <span style={{color:"#a07830"}}>{team.notes.split(" — ")[0]}</span>
                </div>
                <div style={{ fontSize: 10, color: "#507890", marginTop: 3, lineHeight: 1.4 }}>
                  {["p10","p11","p12","p21","p22","trips","empty"].filter(t => team.traits.includes(t)).map(t => PERS_LABELS[t] || t).join("  ·  ")}
                </div>
                <div style={{ fontSize: 10, color: "#3a5060", marginTop: 2, lineHeight: 1.4 }}>{team.notes.split(" — ")[1] || ""}</div>
              </div>
              <div style={{ fontSize: 18, color: team.color, flexShrink: 0, marginLeft: 10 }}>{"→"}</div>
            </button>
          ))}
        </div>
      <Footer />
      </div>
  );
  }

  // ── COMPARE PLAYBOOKS SCREEN ─────────────────────────────────────────────────
  if (step === "compare") {
    const BOOK_NAMES = ["All", ...Object.keys(PLAYBOOKS)];

    const getFormations = (book) => {
      return Object.entries(FDB).filter(([name, d]) =>
        book === "All" || d.books.includes(book) || d.books.includes("All")
      ).map(([name, d]) => ({ name, ...d })).sort((a,b) => a.name.localeCompare(b.name));
    };

    const fmsA = getFormations(compareA);
    const fmsB = getFormations(compareB);
    const namesA = new Set(fmsA.map(f => f.name));
    const namesB = new Set(fmsB.map(f => f.name));
    const onlyA  = fmsA.filter(f => !namesB.has(f.name));
    const onlyB  = fmsB.filter(f => !namesA.has(f.name));
    const shared = fmsA.filter(f => namesB.has(f.name));

    const pbColor = (book) => book === "All" ? "#6888a0" : (PLAYBOOKS[book] && PLAYBOOKS[book].color) || "#6888a0";

    const FmList = ({ fms, borderColor }) => (
      <div>
        {fms.map(fm => (
          <div key={fm.name} style={{ background: "#0d1622", border: "1px solid #1e2d3d", borderLeft: "3px solid " + borderColor, borderRadius: 6, padding: "7px 11px", marginBottom: 5, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: 11, fontWeight: 600, color: "#c5d0dc", fontFamily: "'IBM Plex Mono', monospace" }}>{fm.name}</span>
            <span style={{ fontSize: 10, color: PC[fm.priority], background: PC[fm.priority] + "22", padding: "1px 6px", borderRadius: 4 }}>{PL[fm.priority]}</span>
          </div>
        ))}
      </div>
    );

    return (
      <div style={{ fontFamily: "'IBM Plex Sans', system-ui, sans-serif", background: "#080c12", minHeight: "100vh", color: "#c5d0dc", maxWidth: 720, margin: "0 auto" }}>
        {/* Header */}
        <div style={{ background: "linear-gradient(135deg,#07090f,#0c1220)", borderBottom: "2px solid #b8880c", padding: "13px 15px 12px", paddingTop: "calc(env(safe-area-inset-top) + 13px)", position: "sticky", top: 0, zIndex: 100 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontSize: 10, color: "#a07830", letterSpacing: "2px", textTransform: "uppercase", fontFamily: "'IBM Plex Mono', monospace", marginBottom: 2 }}>Scheme Builders</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: "#c5d0dc", fontFamily: "'IBM Plex Mono', monospace" }}>Compare Playbooks</div>
            </div>
            <button onClick={() => setStep("scout")} style={{ background: "transparent", border: "1px solid #2a3d52", borderRadius: 6, padding: "5px 10px", color: "#6888a0", fontSize: 11, cursor: "pointer", whiteSpace: "nowrap", fontFamily: "'IBM Plex Mono', monospace" }}>← Back</button>
          </div>
        </div>

        <div style={{ padding: "14px 14px 30px" }}>
          {/* Selectors */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr auto 1fr", gap: 8, alignItems: "center", marginBottom: 18 }}>
            <div>
              <div style={{ fontSize: 10, color: "#6888a0", letterSpacing: "1px", textTransform: "uppercase", fontFamily: "'IBM Plex Mono', monospace", marginBottom: 6 }}>Playbook A</div>
              <select value={compareA} onChange={e => setCompareA(e.target.value)} style={{ width: "100%", padding: "8px 10px", background: "#0d1622", border: `2px solid ${pbColor(compareA)}`, borderRadius: 7, color: pbColor(compareA), fontSize: 11, fontFamily: "'IBM Plex Mono', monospace", cursor: "pointer", outline: "none" }}>
                {BOOK_NAMES.map(b => <option key={b} value={b}>{b}</option>)}
              </select>
            </div>
            <div style={{ fontSize: 16, color: "#4a5a6a", textAlign: "center", paddingTop: 20 }}>vs</div>
            <div>
              <div style={{ fontSize: 10, color: "#6888a0", letterSpacing: "1px", textTransform: "uppercase", fontFamily: "'IBM Plex Mono', monospace", marginBottom: 6 }}>Playbook B</div>
              <select value={compareB} onChange={e => setCompareB(e.target.value)} style={{ width: "100%", padding: "8px 10px", background: "#0d1622", border: `2px solid ${pbColor(compareB)}`, borderRadius: 7, color: pbColor(compareB), fontSize: 11, fontFamily: "'IBM Plex Mono', monospace", cursor: "pointer", outline: "none" }}>
                {BOOK_NAMES.map(b => <option key={b} value={b}>{b}</option>)}
              </select>
            </div>
          </div>

          {/* Summary stats */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 8, marginBottom: 18 }}>
            {[
              { label: compareA + " only", count: onlyA.length, color: pbColor(compareA) },
              { label: "Shared", count: shared.length, color: "#6888a0" },
              { label: compareB + " only", count: onlyB.length, color: pbColor(compareB) },
            ].map((s, i) => (
              <div key={i} style={{ background: "#0d1622", border: `1px solid ${s.color}44`, borderTop: `3px solid ${s.color}`, borderRadius: 7, padding: "10px 12px", textAlign: "center" }}>
                <div style={{ fontSize: 22, fontWeight: 700, color: s.color, fontFamily: "'IBM Plex Mono', monospace" }}>{s.count}</div>
                <div style={{ fontSize: 10, color: "#6888a0", marginTop: 3, fontFamily: "'IBM Plex Mono', monospace" }}>{s.label}</div>
              </div>
            ))}
          </div>

          {/* Exclusive to A */}
          {onlyA.length > 0 && (
            <div style={{ marginBottom: 18 }}>
              <div style={{ fontSize: 10, letterSpacing: "2px", textTransform: "uppercase", fontFamily: "'IBM Plex Mono', monospace", marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ color: pbColor(compareA) }}>Exclusive to {compareA}</span>
                <span style={{ background: "#0d1622", border: `1px solid ${pbColor(compareA)}`, borderRadius: 8, padding: "1px 7px", fontSize: 9, color: pbColor(compareA) }}>{onlyA.length}</span>
              </div>
              <FmList fms={onlyA} borderColor={pbColor(compareA)} />
            </div>
          )}

          {/* Shared */}
          {shared.length > 0 && (
            <div style={{ marginBottom: 18 }}>
              <div style={{ fontSize: 10, letterSpacing: "2px", textTransform: "uppercase", fontFamily: "'IBM Plex Mono', monospace", marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ color: "#7f9fb2" }}>In Both Playbooks</span>
                <span style={{ background: "#0d1622", border: "1px solid #2a3d52", borderRadius: 8, padding: "1px 7px", fontSize: 9, color: "#6888a0" }}>{shared.length}</span>
              </div>
              <FmList fms={shared} borderColor="#2a3d52" />
            </div>
          )}

          {/* Exclusive to B */}
          {onlyB.length > 0 && (
            <div style={{ marginBottom: 18 }}>
              <div style={{ fontSize: 10, letterSpacing: "2px", textTransform: "uppercase", fontFamily: "'IBM Plex Mono', monospace", marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ color: pbColor(compareB) }}>Exclusive to {compareB}</span>
                <span style={{ background: "#0d1622", border: `1px solid ${pbColor(compareB)}`, borderRadius: 8, padding: "1px 7px", fontSize: 9, color: pbColor(compareB) }}>{onlyB.length}</span>
              </div>
              <FmList fms={onlyB} borderColor={pbColor(compareB)} />
            </div>
          )}

          {/* Playbook descriptions */}
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginTop: 8 }}>
            {[compareA, compareB].map(book => (
              <div key={book} style={{ background: "#0d1622", border: `1px solid ${pbColor(book)}33`, borderLeft: `3px solid ${pbColor(book)}`, borderRadius: 7, padding: "10px 12px" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: pbColor(book), fontFamily: "'IBM Plex Mono', monospace", marginBottom: 4 }}>{book}</div>
                <div style={{ fontSize: 10, color: "#7f9fb2", lineHeight: 1.55 }}>{book === "All" ? "All formations from every playbook." : (PLAYBOOKS[book] && PLAYBOOKS[book].desc) || ""}</div>
              </div>
            ))}
          </div>
        </div>
      <Footer />
      </div>
    );
  }

  // ── SCOUT SCREEN ─────────────────────────────────────────────────────────────
  if (step === "scout") return (
    <div style={{ fontFamily: "'Georgia',serif", background: "#080c12", minHeight: "100vh", color: "#c5d0dc", maxWidth: 720, margin: "0 auto" }}>
      <div style={{ background: "linear-gradient(135deg,#07090f,#0c1220)", borderBottom: "3px solid #c8960c", padding: "13px 15px 10px", paddingTop: "calc(env(safe-area-inset-top) + 13px)", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontSize: "10px", letterSpacing: "2px", color: "#a07830", textTransform: "uppercase", fontWeight: "bold", fontFamily: "'IBM Plex Mono', monospace" }}>CFB · Defensive Intelligence System</div>
            <div style={{ fontSize: "18px", fontWeight: "700", color: "#c5d0dc", letterSpacing: "-0.3px", fontFamily: "'IBM Plex Mono', monospace" }}>Scheme Builders</div>
          </div>
          <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
            <button onClick={() => setStep("teams")} style={{ padding: "5px 10px", background: "transparent", border: "1px solid #2a3d52", borderRadius: 7, color: "#6888a0", fontSize: 11, cursor: "pointer", whiteSpace: "nowrap" }}>
              🏈 Teams
            </button>
            <button onClick={() => setStep("compare")} style={{ padding: "5px 10px", background: "transparent", border: "1px solid #2a3d52", borderRadius: 7, color: "#6888a0", fontSize: 11, cursor: "pointer", whiteSpace: "nowrap" }}>
              ⚖ Compare Playbooks
            </button>
            <button onClick={() => setShowPB(v => !v)} style={{ padding: "5px 10px", background: "transparent", border: `1px solid ${myBook !== "All" ? "#b8880c" : showPB ? "#b8880c" : "#2a3d52"}`, borderRadius: 7, color: myBook !== "All" ? "#b8880c" : showPB ? "#b8880c" : "#6888a0", fontSize: 11, cursor: "pointer", whiteSpace: "nowrap" }}>
              📖 {myBook !== "All" ? myBook : "My Playbook"}
            </button>
          </div>
        </div>
      </div>

      {showPB && (
        <div style={{ background: "#090f1a", borderBottom: "1px solid #1e2a3a", padding: "14px 16px" }}>
          <div style={{ fontSize: "11px", letterSpacing: "2px", color: "#a07830", textTransform: "uppercase", marginBottom: 12, fontWeight: "bold", fontFamily: "'IBM Plex Mono', monospace" }}>
            Select Your Defensive Playbook
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 7, marginBottom: 12 }}>
            {[["All", "#7f9fb2", "Show all formations from any playbook"], ...Object.entries(PLAYBOOKS).map(([n, pb]) => [n, pb.color, pb.desc])].map(([name, color, desc]) => (
              <button key={name} onClick={() => { changeBook(name); setShowPB(false); }} style={{
                padding: "7px 12px",
                background: myBook === name ? "#1a1408" : "#0d1622",
                border: `1px solid ${myBook === name ? "#b8880c" : "#1e2d3d"}`,
                borderLeft: `3px solid ${myBook === name ? "#b8880c" : color}`,
                borderRadius: 6,
                cursor: "pointer",
                textAlign: "left",
                maxWidth: "100%",
              }}>
                <div style={{ fontSize: 11, fontWeight: "bold", color: myBook === name ? "#b8880c" : color, fontFamily: "'IBM Plex Mono', monospace" }}>
                  {myBook === name ? "✓ " : ""}{name}
                </div>
                <div style={{ fontSize: 10, color: "#6888a0", lineHeight: 1.4, marginTop: 2 }}>{desc}</div>
              </button>
            ))}
          </div>
          {myBook !== "All" && (
            <div style={{ fontSize: 10, color: "#6888a0", fontFamily: "'IBM Plex Mono', monospace" }}>
              Only formations from <span style={{ color: "#b8880c" }}>{myBook}</span> will appear in your game plan.
              Formations marked "All" in the database are included in every playbook.
            </div>
          )}
        </div>
      )}

      <div style={{ padding: "16px 16px" }}>
        {Object.keys(profiles).length > 0 && (
          <div style={{ marginBottom: 18 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
              <div style={{ fontSize: 10, color: "#6888a0", letterSpacing: "2px", textTransform: "uppercase", fontFamily: "'IBM Plex Mono', monospace" }}>
                Saved Opponents · {Object.keys(profiles).length}
              </div>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                {importMsg && (
                  <span style={{ fontSize: 10, color: importMsg.startsWith("✓") ? "#6a9870" : "#aa5050", fontFamily: "'IBM Plex Mono', monospace" }}>
                    {importMsg}
                  </span>
                )}
                {Object.keys(profiles).length > 0 && (
                  <button onClick={exportProfiles} style={{ fontSize: 10, padding: "3px 9px", background: "transparent", border: "1px solid #2a3d52", borderRadius: 5, color: "#7f9fb2", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", whiteSpace: "nowrap" }}>
                    Export
                  </button>
                )}
                <label style={{ fontSize: 10, padding: "3px 9px", background: "transparent", border: "1px solid #2a3d52", borderRadius: 5, color: "#7f9fb2", cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace", whiteSpace: "nowrap" }}>
                  Import
                  <input type="file" accept=".json" onChange={importProfiles} style={{ display: "none" }} />
                </label>
              </div>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
              {Object.keys(profiles).map(n => (
                <div key={n} style={{ display: "flex", alignItems: "center", background: "#0d1622", border: "1px solid #253545", borderRadius: 8, overflow: "hidden" }}>
                  <button onClick={() => setSel(profiles[n])} style={{ padding: "7px 12px", background: "transparent", border: "none", color: "#90b0c4", fontSize: 11, cursor: "pointer", fontFamily: "'IBM Plex Mono', monospace" }}>📂 {n}</button>
                  <div style={{ width: 1, alignSelf: "stretch", background: "#253545" }}/>
                  <button onClick={() => saveProfiles(p => { const x = { ...p }; delete x[n]; return x; })} style={{ padding: "7px 9px", background: "transparent", border: "none", color: "#aa6868", fontSize: 11, cursor: "pointer" }}>✕</button>
                </div>
              ))}
            </div>
          </div>
        )}

        {scored.length > 0 && (
          <div style={{ background: "#0e1408", border: "1px solid #2a3a1e", borderLeft: "4px solid #5a8040", borderRadius: 7, padding: "8px 12px", marginBottom: 16, fontSize: 11, color: "#88bb60", lineHeight: 1.6, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span>✏️ Editing active game plan — add or remove traits then tap Update.</span>
            <button onClick={() => { setSel({}); setScored([]); setSelFm(null); setActiveP(null); }} style={{ background: "transparent", border: "1px solid #2a4a1e", borderRadius: 5, padding: "3px 8px", color: "#70aa50", fontSize: 10, cursor: "pointer", whiteSpace: "nowrap", marginLeft: 8, flexShrink: 0 }}>Clear All</button>
          </div>
        )}
        {scored.length === 0 && (
          <div style={{ background: "#0a1210", border: "1px solid #1e3028", borderLeft: "4px solid #3a6048", borderRadius: 7, padding: "8px 12px", marginBottom: 16, fontSize: 11, color: "#70a080", lineHeight: 1.6 }}>
            🎮 Scout your opponent — select every trait you know. More traits = sharper game plan. All matching formations will be shown and explained.
          </div>
        )}

        {TRAITS.map(group => {
          const cnt = (sel[group.id] || []).length;
          const open = openGrp === group.id;
          return (
            <div key={group.id} style={{ marginBottom: 16, border: `1px solid ${cnt > 0 ? "#222e38" : "#222e3e"}`, borderRadius: 7, overflow: "hidden" }}>
              <button onClick={() => setOpenGrp(open ? null : group.id)} style={{ width: "100%", padding: "14px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", background: cnt > 0 ? "#0a1210" : "#0d1622", border: "none", cursor: "pointer" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontSize: 11 }}>{group.icon}</span>
                  <span style={{ fontSize: 11, fontWeight: "bold", color: cnt > 0 ? "#6a9870" : "#b8880c" }}>{group.label}</span>
                  {cnt > 0 && <span style={{ background: "#1a3020", border: "1px solid #4a8a1a", borderRadius: 9, padding: "1px 7px", fontSize: 11, color: "#6a9870", fontWeight: "bold" }}>{cnt}</span>}
                </div>
                <span style={{ color: cnt > 0 ? "#6a9870" : "#7c9aaf", fontSize: 11 }}>{open ? "▲" : "▼"}</span>
              </button>
              {open && (
                <div style={{ padding: "10px 12px 12px", background: "#080c12", borderTop: "1px solid #1a2030", display: "flex", flexWrap: "wrap", gap: 9 }}>
                  {group.items.map(item => {
                    const on = (sel[group.id] || []).includes(item.id);
                    return (
                      <button key={item.id} onClick={() => toggle(group.id, item.id)} style={{ padding: "7px 12px", borderRadius: 18, border: on ? "2px solid #c8960c" : "2px solid #1e2a3a", background: on ? "#121008" : "#0d1622", color: on ? "#f0c040" : "#e8eef4", fontSize: 11, fontWeight: on ? "bold" : "normal", cursor: "pointer", transition: "all 0.1s" }}>
                        {on ? "✓ " : ""}{item.label}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}

        <div style={{ marginTop: 20, display: "flex", flexDirection: "column", alignItems: "center", gap: 14 }}>

          {/* Run/Pass selector — top of section */}
          <div style={{ width: "100%", maxWidth: 340 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 7 }}>
              <span style={{ fontSize: 10, fontWeight: "bold", color: "#8aa8be", fontFamily: "'IBM Plex Mono', monospace", letterSpacing: "1px" }}>PASS</span>
              <span style={{ fontSize: 10, fontWeight: "bold", fontFamily: "'IBM Plex Mono', monospace",
                color: [,"#3a8fe8","#4a9ed4","#4aa890","#4a9460","#b89040","#d07028","#d84810"][runPass] }}>
                {["","Full Pass","Pass","Pass Lean","Balanced","Run Lean","Run","Full Run"][runPass]}
              </span>
              <span style={{ fontSize: 10, fontWeight: "bold", color: "#8aa8be", fontFamily: "'IBM Plex Mono', monospace", letterSpacing: "1px" }}>RUN</span>
            </div>
            <div style={{ display: "flex", gap: 3, border: "1px solid #2a3d52", background: "#0d1825", padding: 3, borderRadius: 12 }}>
              {[1,2,3,4,5,6,7].map(pos => {
                const isActive = runPass === pos;
                // Green center, fading to blue (pass) or orange (run) at extremes
                const COLORS  = { 1:"#3a8fe8", 2:"#4a9ed4", 3:"#4aa890", 4:"#4a9460", 5:"#b89040", 6:"#d07028", 7:"#d84810" };
                const BGS     = { 1:"#0a1e40", 2:"#0a2038", 3:"#0a2030", 4:"#0e2018", 5:"#281c08", 6:"#301808", 7:"#381005" };
                const BORDERS = { 1:"#2a6ecc", 2:"#3a80b8", 3:"#3a8870", 4:"#3a7048", 5:"#907830", 6:"#b05820", 7:"#c03810" };
                return (
                  <button key={pos} onClick={() => setRunPass(pos)} style={{
                    flex: 1, padding: "8px 0", borderRadius: 8, cursor: "pointer",
                    transition: "all 0.12s", fontFamily: "'IBM Plex Mono', monospace",
                    fontSize: 11, fontWeight: isActive ? "bold" : "normal",
                    background: isActive ? BGS[pos] : "transparent",
                    border: isActive ? `1px solid ${BORDERS[pos]}` : "1px solid transparent",
                    color: isActive ? COLORS[pos] : "#506880",
                  }}>
                    {pos === 4 ? "●" : pos < 4 ? "◀".repeat(4 - pos) : "▶".repeat(pos - 4)}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Traits counter + playbook note */}
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 5 }}>
            <span style={{ fontSize: 11, color: "#7f9fb2" }}>{flat.length} trait{flat.length !== 1 ? "s" : ""} selected</span>
            {myBook !== "All" && (
              <span style={{ fontSize: 10, color: "#a07830", fontFamily: "'IBM Plex Mono', monospace" }}>
                📖 {myBook} · {Object.values(FDB).filter(d => d.books.includes(myBook) || d.books.includes("All")).length} formations
              </span>
            )}
          </div>

          {/* Action buttons */}
          {flat.length >= 2 && (
            <button onClick={() => setModal(true)} style={{ padding: "5px 18px", background: "transparent", border: "1px solid #2a4a6a", borderRadius: 17, color: "#6888a0", fontSize: 11, cursor: "pointer" }}>💾 Save Opponent Profile</button>
          )}
          <button onClick={build} disabled={flat.length < 2} style={{ padding: "12px 36px", background: flat.length >= 2 ? "linear-gradient(135deg,#3a2c08,#6a5010,#3a2c08)" : "#141414", border: flat.length >= 2 ? "2px solid #6a5010" : "2px solid #1e1e1e", borderRadius: 26, color: flat.length >= 2 ? "#0a0e16" : "#333", fontSize: 11, fontWeight: "bold", cursor: flat.length >= 2 ? "pointer" : "not-allowed", letterSpacing: "1px", textTransform: "uppercase" }}>
            🛡️ {scored.length > 0 ? "Update Game Plan" : "Build Game Plan"}
          </button>
        </div>
      </div>

      {modal && (
        <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 20 }}>
          <div style={{ background: "#0d1622", border: "1px solid #c8960c", borderRadius: 10, padding: "18px 20px", width: "100%", maxWidth: 310 }}>
            <div style={{ fontSize: 11, fontWeight: "bold", color: "#c5d0dc", marginBottom: 6, fontFamily: "'IBM Plex Mono', monospace" }}>Save Opponent Profile</div>
            <div style={{ fontSize: 10, color: "#6888a0", marginBottom: 14 }}>Saved profiles persist between sessions on this device.</div>
            <input value={saveName} onChange={e => setSaveName(e.target.value)} placeholder="e.g. Player B, RPO Friend..." style={{ width: "100%", padding: "14px 16px", background: "#080c12", border: "1px solid #2a3a50", borderRadius: 6, color: "#c5d0dc", fontSize: 11, boxSizing: "border-box" }} />
            <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
              <button onClick={() => { if (saveName.trim()) saveProfiles(p => ({ ...p, [saveName.trim()]: sel })); setModal(false); setSaveName(""); }} disabled={!saveName.trim()} style={{ flex: 1, padding: "8px", background: "#b8880c", border: "none", borderRadius: 6, color: "#0a0e16", fontWeight: "bold", fontSize: 11, cursor: "pointer" }}>Save</button>
              <button onClick={() => { setModal(false); setSaveName(""); }} style={{ flex: 1, padding: "8px", background: "transparent", border: "1px solid #2a3a50", borderRadius: 6, color: "#7f9fb2", fontSize: 11, cursor: "pointer" }}>Cancel</button>
            </div>
          </div>
        </div>
      )}
      <Footer />
    </div>
  );

  // ── GAME PLAN SCREEN ──────────────────────────────────────────────────────────
  const personnel = personnelSel.length ? personnelSel : ["p11"];
  const grouped = groupByPersonnel(scored);

  // ── Recommended playbook ──────────────────────────────────────
  // Method: top-8 formation average × scheme-affinity boost
  // Pool: 8 base/focused books (no bare "Multiple" superset)
  // Scheme type inferred from trait distribution — encodes play-call tendency
  const recBook = (() => {
    const allScored = scoreAll(flat, "All");
    if (!allScored.length) return null;

    const BOOKS = ["4-3","4-3 Multiple","3-4","3-4 Multiple","4-2-5","3-3-5","3-3-5 Tite","3-2-6"];

    // Signal sets for scheme inference
    const RUN_T    = ["inside_run","outside_run","strong_oline","p21","p22","fb_lead","short_yardage_run","run_heavy_1st","option_run","triple_option"];
    const PASS_T   = ["empty","p10","no_deep","qb_pocket","crossers","flat_attack","hurry_up","middle_heavy","four_wide","quick_game"];
    const SPREAD_T = ["hurry_up","rpo","trips","motion_heavy","outside_run","mobile_qb","qb_scramble"];
    const OPT_T    = ["option_run","triple_option","dual_threat"];
    const runSc    = flat.filter(t => RUN_T.includes(t)).length;
    const passSc   = flat.filter(t => PASS_T.includes(t)).length;
    const spreadSc = flat.filter(t => SPREAD_T.includes(t)).length;
    const optSc    = flat.filter(t => OPT_T.includes(t)).length;

    // Spread-Option: has option signals but also passes — don't treat like pure option
    const isSpreadOption = optSc >= 1 && spreadSc >= 3 && passSc >= 2;
    const schemeType =
        (optSc >= 2 && !isSpreadOption) ? "Option"
      : passSc >= 6                     ? "Air Raid"
      : runSc  >= 7                     ? "Pro Style"
      : passSc >= 4                     ? "Spread"
      : (spreadSc >= 4 && runSc <= 3)   ? "Spread"
      : isSpreadOption                  ? "Spread"
      : runSc  >= 4                     ? "Power Spread"
      : "Multiple Offense";

    // Scheme → defensive playbook affinity multipliers
    const BOOST = {
      "Air Raid":        {"3-2-6":1.6,"4-2-5":1.3,"3-3-5":1.2,"3-3-5 Tite":1.1,"4-3 Multiple":0.8,"3-4 Multiple":0.8,"4-3":0.7,"3-4":0.7},
      "Run And Shoot":   {"3-2-6":1.6,"3-3-5":1.3,"4-2-5":1.2,"3-3-5 Tite":1.1,"4-3 Multiple":0.8,"3-4 Multiple":0.8,"4-3":0.7,"3-4":0.7},
      "Spread":          {"4-2-5":1.4,"3-3-5 Tite":1.2,"3-3-5":1.1,"3-2-6":1.0,"4-3 Multiple":1.0,"3-4 Multiple":1.0,"4-3":0.9,"3-4":0.9},
      "Veer and Shoot":  {"4-2-5":1.35,"3-3-5 Tite":1.2,"3-4 Multiple":1.1,"4-3 Multiple":1.0,"4-3":0.9,"3-4":0.9,"3-3-5":1.0,"3-2-6":0.75},
      "Spread Option":   {"4-2-5":1.35,"4-3 Multiple":1.1,"3-4 Multiple":1.2,"4-3":1.0,"3-4":1.0,"3-3-5 Tite":1.0,"3-3-5":0.85,"3-2-6":0.5},
      "Power Spread":    {"4-2-5":1.3,"4-3 Multiple":1.2,"3-4 Multiple":1.25,"4-3":1.1,"3-4":1.1,"3-3-5 Tite":1.0,"3-3-5":0.85,"3-2-6":0.6},
      "Multiple Offense":{"4-3 Multiple":1.3,"3-4 Multiple":1.3,"4-3":1.2,"3-4":1.2,"4-2-5":1.0,"3-3-5 Tite":0.85,"3-3-5":0.75,"3-2-6":0.55},
      "Pro Style":       {"4-3 Multiple":1.3,"3-4 Multiple":1.3,"4-3":1.35,"3-4":1.35,"4-2-5":0.9,"3-3-5 Tite":0.75,"3-3-5":0.65,"3-2-6":0.45},
      "Pistol":          {"4-2-5":1.3,"3-4 Multiple":1.2,"4-3 Multiple":1.1,"3-4":1.1,"4-3":1.05,"3-3-5 Tite":1.0,"3-3-5":0.9,"3-2-6":0.7},
      "Option":          {"3-4 Multiple":1.35,"4-3 Multiple":1.25,"4-3":1.25,"3-4":1.3,"4-2-5":0.7,"3-3-5 Tite":0.6,"3-3-5":0.55,"3-2-6":0.25},
    };
    const boosts = BOOST[schemeType] || BOOST["Multiple Offense"];

    // Top-8 average per playbook — eliminates "larger book wins" size bias
    const N = 8;
    const raw = {}; const cnt = {};
    BOOKS.forEach(pb => { raw[pb] = []; cnt[pb] = 0; });
    allScored.forEach(fm => {
      if (fm.books.includes("All")) return;
      BOOKS.forEach(pb => {
        if (fm.books.includes(pb)) { raw[pb].push(fm.sc); cnt[pb]++; }
      });
    });
    const adjusted = {};
    BOOKS.forEach(pb => {
      const top = raw[pb].sort((a,b) => b-a).slice(0, N);
      const avg = top.length ? top.reduce((s,v) => s+v, 0) / top.length : 0;
      adjusted[pb] = avg * (boosts[pb] || 1.0);
    });
    const best = BOOKS.reduce((a, b) => adjusted[b] > adjusted[a] ? b : a);
    const second = BOOKS.filter(b => b !== best).reduce((a, b) => adjusted[b] > adjusted[a] ? b : a);
    const gap = adjusted[best] - adjusted[second];
    const gapPct = adjusted[best] > 0 ? gap / adjusted[best] : 0;
    const confidence = gapPct >= 0.20 ? "Strong" : gapPct >= 0.09 ? "Moderate" : "Marginal";
    return { book: best, count: cnt[best] || 0, total: allScored.length, confidence, second, gap: Math.round(gapPct * 100) };
  })();

  return (
    <div style={{ fontFamily: "'Georgia',serif", background: "#080c12", minHeight: "100vh", color: "#c5d0dc", maxWidth: 720, margin: "0 auto" }}>
      {/* Header */}
      <div style={{ background: "linear-gradient(135deg,#07090f,#0c1220)", borderBottom: "3px solid #c8960c", padding: "12px 15px 10px", paddingTop: "calc(env(safe-area-inset-top) + 12px)", position: "sticky", top: 0, zIndex: 100 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <div>
            <div style={{ fontSize: "10px", letterSpacing: "2px", color: "#a07830", textTransform: "uppercase", fontWeight: "bold", fontFamily: "'IBM Plex Mono', monospace" }}>CFB · Defensive Intelligence System</div>
            <div style={{ fontSize: "17px", fontWeight: "700", color: "#c5d0dc", fontFamily: "'IBM Plex Mono', monospace" }}>Game Plan — {scored.length} Formation{scored.length !== 1 ? "s" : ""}{myBook !== "All" ? " · " + myBook : ""}</div>
          </div>
          <div style={{ display: "flex", gap: 6, alignItems: "center", flexShrink: 0 }}>
              {recBook && (
                <button onClick={() => setShowRecModal(true)} style={{ background: showRecModal ? "#0e1a08" : "transparent", border: `1px solid ${showRecModal ? "#508840" : "#2a3545"}`, borderRadius: 6, padding: "5px 10px", color: showRecModal ? "#70b850" : "#7f9fb2", fontSize: 11, cursor: "pointer", whiteSpace: "nowrap" }}>
                  {"📖 Rec. Playbook"}
                </button>
              )}
              <button onClick={() => setQuickAdjOpen(v => !v)} style={{ background: quickAdjOpen ? "#1a1408" : "transparent", border: `1px solid ${quickAdjOpen ? "#b8880c" : "#2a3545"}`, borderRadius: 6, padding: "5px 10px", color: quickAdjOpen ? "#b8880c" : "#7f9fb2", fontSize: 11, cursor: "pointer", whiteSpace: "nowrap" }}>
                ⚡ Adjust
              </button>
              <button onClick={handleShare} style={{ background: "transparent", border: "1px solid #2a3545", borderRadius: 6, padding: "5px 10px", color: "#7898ae", fontSize: 11, cursor: "pointer", whiteSpace: "nowrap" }}>
                {shareToast === "shared" ? "✓ Sent" : shareToast === "copied" ? "✓ Copied" : "⬆ Share"}
              </button>
              {sel._team ? (
                <button onClick={() => { setStep("teams"); setSelFm(null); setQuickAdjOpen(false); }} style={{ background: "transparent", border: "1px solid #2a3545", borderRadius: 6, padding: "5px 10px", color: "#7898ae", fontSize: 11, cursor: "pointer", whiteSpace: "nowrap" }}>← Teams</button>
              ) : (
                <button onClick={() => { setStep("scout"); setSelFm(null); setQuickAdjOpen(false); }} style={{ background: "transparent", border: "1px solid #2a3545", borderRadius: 6, padding: "5px 10px", color: "#7898ae", fontSize: 11, cursor: "pointer", whiteSpace: "nowrap" }}>← Edit</button>
              )}
            </div>
        </div>

        {/* Main tabs */}
        <div style={{ display: "flex", gap: 8, marginTop: 9 }}>
          {[
            { id: "personnel", l: "📋 By His Personnel" },
            { id: "all",       l: `🏟️ All ${scored.length} Formations` },
          ].map(t => (
            <button key={t.id} onClick={() => setMainTab(t.id)} style={{ padding: "6px 13px", background: mainTab === t.id ? "#111009" : "transparent", border: `1px solid ${mainTab === t.id ? "#b8880c" : "#507890"}`, borderRadius: 7, color: mainTab === t.id ? "#b08010" : "#7f9fb2", fontSize: 11, fontWeight: mainTab === t.id ? "bold" : "normal", cursor: "pointer" }}>{t.l}</button>
          ))}
        </div>
      </div>

      <div style={{ padding: "14px 16px" }}>

        {/* ══ TAB: BY HIS PERSONNEL ══ */}
        {mainTab === "personnel" && (
          <div>
            <div style={{ fontSize: "12px", letterSpacing: "2px", color: "#b8880c", textTransform: "uppercase", marginBottom: 18, fontWeight: "bold", fontFamily: "'IBM Plex Mono', monospace" }}>Formation + Personnel</div>

            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 18 }}>
              {getAvailableFamilies(flat).map(fid => {
                const fam = PERSONNEL_FAMILIES[fid];
                return fam ? (
                  <button key={fid} onClick={() => { setActiveP(fid); setSelFm(null); }} style={{ padding: "7px 11px", background: activeP === fid ? "#111009" : "#0d1622", border: `2px solid ${activeP === fid ? "#b8880c" : "#507890"}`, borderRadius: 7, color: activeP === fid ? "#b08010" : "#7f9fb2", fontSize: 11, fontWeight: activeP === fid ? "bold" : "normal", cursor: "pointer" }}>
                    {fam.label}
                  </button>
                ) : null;
              })}
            </div>

            {activeP && (PERSONNEL_FAMILIES[activeP] || PMAP[activeP]) && (() => {
              const fam = PERSONNEL_FAMILIES[activeP];
              const pd  = fam ? PMAP[fam.base] : PMAP[activeP];
              const adj = FAMILY_ADJUSTMENTS[activeP];
              const persMatchesRaw = fam ? scoreForFamily(activeP, flat)
                                          : scoreForPersonnel(activeP, flat);
              const persMatches = (myBook && myBook !== "All"
                ? persMatchesRaw.filter(f => f.books && (f.books.includes(myBook) || f.books.includes("All")))
                : persMatchesRaw
              ).slice(0, 8);

              return (
                <div>
                  <div style={{ background: "#090f1a", border: "1px solid #1e2a3a", borderRadius: 7, padding: "9px 13px", marginBottom: 16 }}>
                    {fam && <div style={{ marginBottom: 10, paddingBottom: 10, borderBottom: "1px solid #1e2a3a" }}>
                      <div style={{ fontSize: "12px", color: "#7f9fb2", letterSpacing: "2px", textTransform: "uppercase", marginBottom: 3, fontFamily: "'IBM Plex Mono', monospace" }}>Alignment</div>
                      <div style={{ fontSize: 11, color: "#90b0c4" }}>{fam.desc}</div>
                    </div>}
                    {adj && <div style={{ marginBottom: 10, paddingBottom: 10, borderBottom: "1px solid #1e2a3a" }}>
                      <div style={{ fontSize: "12px", color: "#b8880c", letterSpacing: "2px", textTransform: "uppercase", marginBottom: 5, fontFamily: "'IBM Plex Mono', monospace" }}>Alignment DC Rule</div>
                      <div style={{ fontSize: 11, color: "#c5d0dc", lineHeight: 1.65, marginBottom: 8 }}>{adj.extra}</div>
                      <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                        {adj.bias && adj.bias.map(b => <span key={b} style={{ fontSize: 10, padding: "2px 8px", border: "1px solid #9a702044", borderRadius: 5, color: "#b8880c", fontFamily: "'IBM Plex Mono', monospace" }}>{b}</span>)}
                      </div>
                    </div>}
                    {pd && <div>
                      <div style={{ fontSize: "12px", color: "#a07830", letterSpacing: "2px", textTransform: "uppercase", marginBottom: 2, fontFamily: "'IBM Plex Mono', monospace" }}>DC Priority</div>
                      <div style={{ fontSize: 11, color: "#c5d0dc", lineHeight: 1.6, marginBottom: 18 }}>{pd.priority}</div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                        <div style={{ background: "#160808", border: "1px solid #5a1a1a", borderRadius: 6, padding: "6px 9px" }}>
                          <div style={{ fontSize: "12px", color: "#cc5050", letterSpacing: "1px", textTransform: "uppercase", marginBottom: 2, fontFamily: "'IBM Plex Mono', monospace" }}>⚠️ Avoid</div>
                          <div style={{ fontSize: 11, color: "#aa6868", lineHeight: 1.6 }}>{pd.avoid}</div>
                        </div>
                        <div style={{ background: "#08140a", border: "1px solid #1a5a1a", borderRadius: 6, padding: "6px 9px" }}>
                          <div style={{ fontSize: "12px", color: "#558a68", letterSpacing: "1px", textTransform: "uppercase", marginBottom: 2, fontFamily: "'IBM Plex Mono', monospace" }}>💡 Blitz Guide</div>
                          <div style={{ fontSize: 11, color: "#70a080", lineHeight: 1.6 }}>{pd.blitzNote}</div>
                        </div>
                      </div>
                    </div>}
                  </div>

                  <div style={{ fontSize: "12px", letterSpacing: "2px", color: "#7f9fb2", textTransform: "uppercase", marginBottom: 16, fontFamily: "'IBM Plex Mono', monospace" }}>
                    {persMatches.length} formations matched
                  </div>
                  {persMatches.length === 0 && (
                    <div style={{ fontSize: 11, color: "#7f9fb2", padding: "10px", textAlign: "center" }}>
                      No scout traits matched for this personnel yet. Go back and add more traits.
                    </div>
                  )}
                  {persMatches.map((fm, i) => (
                    <div key={fm.name}>
                      <FormationCard
                        fm={fm}
                        flat={flat}
                        onSelect={f => setSelFm(selFm && selFm.name === f.name ? null : f)}
                        isSelected={selFm && selFm.name === fm.name}
                      />
                      {selFm && selFm.name === fm.name && (
                        <FormationDetail fm={fm} flat={flat} />
                      )}
                    </div>
                  ))}
                </div>
              );
            })()}
          </div>
        )}

        {/* ══ TAB: ALL FORMATIONS ══ */}
        {mainTab === "all" && (
          <div>
            <div style={{ background: "#0a1210", border: "1px solid #1e3028", borderLeft: "4px solid #3a6048", borderRadius: 7, padding: "8px 12px", marginBottom: 18, fontSize: 11, color: "#70a080", lineHeight: 1.6 }}>
              All {scored.length} formations matched by your scouting, grouped by personnel type. ★ Gold pills = core match to your scouted traits. Blue pills = supporting match. Tap any card to expand full detail.
            </div>

            {grouped.map(group => (
              <div key={group.label} style={{ marginBottom: 14 }}>
                <div style={{ fontSize: "11px", letterSpacing: "2px", color: "#b8880c", textTransform: "uppercase", marginBottom: 16, fontWeight: "bold", fontFamily: "'IBM Plex Mono', monospace", display: "flex", alignItems: "center", gap: 8 }}>
                  <span>{group.label} Formations</span>
                  <span style={{ background: "#111009", border: "1px solid #3a2800", borderRadius: 9, padding: "1px 7px", fontSize: 11, color: "#b8880c" }}>{group.formations.length}</span>
                </div>
                {group.formations.map(fm => (
                  <div key={fm.name}>
                    <FormationCard
                      fm={fm}
                      flat={flat}
                      onSelect={f => setSelFm(selFm && selFm.name === f.name ? null : f)}
                      isSelected={selFm && selFm.name === fm.name}
                    />
                    {selFm && selFm.name === fm.name && (
                      <FormationDetail fm={fm} flat={flat} />
                    )}
                  </div>
                ))}
              </div>
            ))}
          </div>
        )}

        {/* In-game tip */}
        <div style={{ background: "#0a1210", border: "1px solid #1e3028", borderLeft: "4px solid #3a6048", borderRadius: 7, padding: "14px 16px", marginBottom: 14, marginTop: 8 }}>
          <div style={{ fontWeight: "bold", color: "#68a078", fontSize: 11, marginBottom: 3 }}>💡 In-Game DC Adjustment Rule</div>
          <div style={{ fontSize: 11, color: "#68a078", lineHeight: 1.65 }}>
            Identify <em style={{ color: "#70a080" }}>which window</em> he's attacking: flat, seam, hash, middle, or deep. Use the "All Formations" tab and sort by your opponent's new tendency. Match his personnel first — then optimize for the specific window he's attacking within it.
          </div>
        </div>

        <div style={{ textAlign: "center", paddingBottom: 16 }}>
          <button onClick={() => { setStep("scout"); setSel({}); setScored([]); setSelFm(null); setActiveP(null); setTeamSearch(""); setTeamConf("all"); }} style={{ background: "transparent", border: "1px solid #1e2a3a", borderRadius: 17, padding: "7px 20px", color: "#7c9aaf", fontSize: 11, cursor: "pointer" }}>🔁 New Opponent</button>
        </div>
      </div>

      {/* ── QUICK ADJUST OVERLAY ── */}
      {quickAdjOpen && (
        <div style={{ position: "fixed", bottom: 0, left: 0, right: 0, zIndex: 200, background: "linear-gradient(to top, #07090f, #0a0f1a)", borderTop: "2px solid #b8880c", padding: "14px 16px 32px", maxWidth: 720, margin: "0 auto" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
            <div>
              <div style={{ fontSize: 10, color: "#a07830", letterSpacing: "2px", textTransform: "uppercase", fontFamily: "'IBM Plex Mono', monospace", marginBottom: 2 }}>⚡ In-Game Adjust</div>
              <div style={{ fontSize: 12, color: "#c5d0dc", fontFamily: "'IBM Plex Mono', monospace" }}>Tap a new trait — game plan updates instantly</div>
            </div>
            <button onClick={() => setQuickAdjOpen(false)} style={{ background: "transparent", border: "1px solid #2a3d52", borderRadius: 6, padding: "5px 10px", color: "#6888a0", fontSize: 11, cursor: "pointer" }}>✕ Close</button>
          </div>
          <div style={{ maxHeight: 260, overflowY: "auto" }}>
            {TRAITS.map(group => (
              <div key={group.id} style={{ marginBottom: 10 }}>
                <div style={{ fontSize: 10, color: "#6888a0", letterSpacing: "1px", textTransform: "uppercase", fontFamily: "'IBM Plex Mono', monospace", marginBottom: 6 }}>
                  {group.icon} {group.label}
                </div>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                  {group.items.map(item => {
                    const on = (sel[group.id] || []).includes(item.id);
                    return (
                      <button key={item.id} onClick={() => {
                        toggle(group.id, item.id);
                        const newSel = { ...sel };
                        const cur = newSel[group.id] || [];
                        newSel[group.id] = cur.includes(item.id) ? cur.filter(x => x !== item.id) : [...cur, item.id];
                        const newFlat = Object.values(newSel).flat();
                        const results = scoreAll(newFlat, myBook);
                        setScored(results);
                        setSelFm(null);
                      }} style={{
                        padding: "5px 10px", borderRadius: 14,
                        border: on ? "1px solid #b8880c" : "1px solid #1e2d3d",
                        background: on ? "#1a1408" : "#0d1622",
                        color: on ? "#f0c040" : "#c5d0dc",
                        fontSize: 11, cursor: "pointer",
                      }}>
                        {on ? "✓ " : ""}{item.label}
                      </button>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Recommended Playbook Modal */}
      {showRecModal && recBook && (
        <div onClick={() => setShowRecModal(false)} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.85)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 200, padding: 20 }}>
          <div onClick={e => e.stopPropagation()} style={{ background: "#0d1622", border: "1px solid #508840", borderRadius: 12, padding: "22px 22px 20px", width: "100%", maxWidth: 340 }}>
            <div style={{ fontSize: 10, letterSpacing: "2px", textTransform: "uppercase", color: "#70b850", fontFamily: "'IBM Plex Mono', monospace", marginBottom: 10 }}>Recommended Playbook</div>
            <div style={{ fontSize: 24, fontWeight: "bold", color: "#c5d0dc", fontFamily: "'IBM Plex Mono', monospace", marginBottom: 6 }}>{recBook.book}</div>
            <div style={{ fontSize: 11, color: "#7f9fb2", lineHeight: 1.6, marginBottom: 12 }}>
              {recBook.count} of {recBook.total} top formations are in this playbook — the best defensive coverage for this opponent.
            </div>
            <div style={{ fontSize: 10, color: "#508840", lineHeight: 1.55, marginBottom: 20, paddingLeft: 8, borderLeft: "2px solid #2a5830" }}>
              {PLAYBOOKS[recBook.book] ? PLAYBOOKS[recBook.book].desc : ""}
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => { changeBook(recBook.book); setShowRecModal(false); }} style={{ flex: 1, padding: "10px", background: "#2a5020", border: "1px solid #508840", borderRadius: 7, color: "#90e070", fontWeight: "bold", fontSize: 12, cursor: "pointer" }}>
                {"Use " + recBook.book}
              </button>
              <button onClick={() => { changeBook("All"); setShowRecModal(false); }} style={{ flex: 1, padding: "10px", background: "transparent", border: "1px solid #2a3a50", borderRadius: 7, color: "#7f9fb2", fontSize: 12, cursor: "pointer" }}>
                Keep All Plays
              </button>
            </div>
          </div>
        </div>
      )}

      <Footer />
    </div>
  );
}


// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(CFB26Schemes, null));
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('[SW] registered:', reg.scope))
          .catch(err => console.warn('[SW] failed:', err));
      });
    }
  </script>
